name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-parent:
    name: Test (parent repo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test

  test-crew-cli:
    name: Test (crew-cli)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crew-cli
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck:touched
      - run: npm test
      - name: Benchmark Regression Check (preset harness)
        run: npm run benchmark:check:ci
