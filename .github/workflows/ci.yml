name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install ripgrep (used by lib/integrations/code-search)
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: npm ci
      - run: npm install --prefix apps/dashboard
      - run: cd apps/dashboard && npm run build
      - name: Bootstrap minimal config
        run: |
          mkdir -p ~/.crewswarm
          echo '{"agents":[],"providers":{}}' > ~/.crewswarm/crewswarm.json
          echo '[]' > ~/.crewswarm/cmd-allowlist.json
          echo '{}' > ~/.crewswarm/agent-prompts.json
      - run: npm run doctor
      - run: npm run test:unit
      - run: npm run smoke:static
      - run: npm run release:check

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - run: npm install --prefix apps/dashboard
      - name: Bootstrap minimal config
        run: |
          mkdir -p ~/.crewswarm
          echo '{"agents":[],"providers":{}}' > ~/.crewswarm/crewswarm.json
          echo '[]' > ~/.crewswarm/cmd-allowlist.json
          echo '{}' > ~/.crewswarm/agent-prompts.json
      - run: npm run test:integration

  crew-cli-tests:
    name: Crew-CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: cd crew-cli && npm ci
      - run: cd crew-cli && npm run build
      - run: cd crew-cli && npm test

  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: cd apps/dashboard && npm ci && npm run build
      - name: Bootstrap minimal config
        run: |
          mkdir -p ~/.crewswarm
          echo '{"agents":[],"providers":{}}' > ~/.crewswarm/crewswarm.json
          echo '[]' > ~/.crewswarm/cmd-allowlist.json
          echo '{}' > ~/.crewswarm/agent-prompts.json
      - name: Start crew-lead and dashboard
        run: |
          node crew-lead.mjs > /tmp/crew-lead.log 2>&1 &
          node scripts/dashboard.mjs > /tmp/dashboard.log 2>&1 &
      - name: Wait for dashboard health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4319/api/health >/dev/null 2>&1; then
              echo "dashboard healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "dashboard health check failed — logs follow"
          echo "── crew-lead.log ──"; tail -50 /tmp/crew-lead.log || true
          echo "── dashboard.log ──"; tail -50 /tmp/dashboard.log || true
          exit 1
      - run: npx playwright test --reporter=github
