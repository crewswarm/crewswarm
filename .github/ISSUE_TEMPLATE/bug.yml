name: Bug report
description: Something is broken or not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The more detail you provide, the faster this gets fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: "e.g. crew-coder dispatched but never replied — task hung indefinitely"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "e.g. crew-coder should have returned a result within the dispatch timeout"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set crew-coder model to ...
        2. Send message: "..."
        3. See error in /tmp/crew-lead.log
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste from `/tmp/crew-lead.log`, `/tmp/opencrew-rt-daemon.log`, or browser console.
      render: shell

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "node --version"
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Execution engine
      options:
        - Direct API (default)
        - OpenCode
        - Cursor CLI
        - Claude Code
        - Codex CLI
        - Not sure
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.2, Ubuntu 24.04, etc."
