name: Bug Report
description: Report a reproducible issue in crew-cli
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include enough detail for us to reproduce quickly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Clear, concise description.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: crew-cli version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Exact steps/commands to reproduce.
      placeholder: |
        1. Run ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/Error Output
      description: Paste relevant terminal output.
      render: shell
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, shell, and any relevant setup details.
