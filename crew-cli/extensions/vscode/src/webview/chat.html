<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrewSwarm Chat</title>
  <link rel="stylesheet" href="${styles}">
</head>
<body>
  <div id="chat-container">
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="message-input" placeholder="Type your message to CrewSwarm..." autofocus>
      <button id="send-btn">Send</button>
    </div>
  </div>
  <script src="${script}"></script>
</body>
</html>
